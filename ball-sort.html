<script>
// ============ GAME ENGINE ============
const COLORS = 6;
const BALLS_PER_TUBE = 4;
const EMPTY_TUBES = 2;
const TOTAL_TUBES = COLORS + EMPTY_TUBES;

let tubes = [];         // tubes[0..7] = [color, color, ...] bottom first
let selectedTube = null;
let moves = 0;
let bestMoves = null;
let hints = 0;
let moveHistory = [];

// Colors and their CSS classes
const COLOR_CLASSES = ['c0','c1','c2','c3','c4','c5','c6','c7'];

// DOM
const tubesArea = document.getElementById('tubes-area');
const movesDisplay = document.getElementById('moves-display');
const bestDisplay = document.getElementById('best-display');
const winOverlay = document.getElementById('win-overlay');
const winSteps = document.getElementById('win-steps');
const winBest = document.getElementById('win-best');
const toast = document.getElementById('toast');

// Load best score
const saved = JSON.parse(localStorage.getItem('ballSort_best') || '{}');
bestMoves = saved[COLORS] || null;
bestDisplay.textContent = bestMoves !== null ? bestMoves : '-';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generatePuzzle() {
  // Create COLORS tubes, each with BALLS_PER_TUBE balls of the same color
  const allBalls = [];
  for (let c = 0; c < COLORS; c++) {
    for (let b = 0; b < BALLS_PER_TUBE; b++) {
      allBalls.push(c);
    }
  }
  const shuffled = shuffle(allBalls);

  // Distribute shuffled balls into tubes
  tubes = [];
  for (let t = 0; t < COLORS; t++) {
    tubes.push(shuffled.slice(t * BALLS_PER_TUBE, (t + 1) * BALLS_PER_TUBE));
  }
  // Add empty tubes
  for (let t = 0; t < EMPTY_TUBES; t++) {
    tubes.push([]);
  }

  // Add some randomness but keep puzzle solvable
  // Shuffle a few balls between tubes
  for (let i = 0; i < COLORS * 2; i++) {
    const t1 = Math.floor(Math.random() * COLORS);
    const t2 = Math.floor(Math.random() * COLORS);
    if (t1 !== t2 && tubes[t1].length > 0 && tubes[t2].length < BALLS_PER_TUBE) {
      tubes[t2].push(tubes[t1].pop());
    }
  }
}

function initGame() {
  generatePuzzle();
  selectedTube = null;
  moves = 0;
  hints = 0;
  moveHistory = [];
  movesDisplay.textContent = '0';
  winOverlay.classList.remove('show');
  renderAll();
}

function tubeComplete(tube) {
  if (tube.length !== BALLS_PER_TUBE) return false;
  const color = tube[0];
  return tube.every(b => b === color);
}

function checkWin() {
  let completedTubes = 0;
  for (const tube of tubes) {
    if (tube.length === 0) continue;
    if (tubeComplete(tube)) completedTubes++;
  }
  if (completedTubes === COLORS) {
    // WIN!
    winSteps.textContent = moves + ' moves';
    if (bestMoves === null || moves < bestMoves) {
      bestMoves = moves;
      const saved = JSON.parse(localStorage.getItem('ballSort_best') || '{}');
      saved[COLORS] = bestMoves;
      localStorage.setItem('ballSort_best', JSON.stringify(saved));
      bestDisplay.textContent = bestMoves;
      winBest.textContent = '🏆 New Record!';
    } else {
      winBest.textContent = 'Best: ' + bestMoves + ' moves';
    }
    setTimeout(() => winOverlay.classList.add('show'), 400);
    return true;
  }
  return false;
}

function canPour(fromIdx, toIdx) {
  if (fromIdx === toIdx) return false;
  const from = tubes[fromIdx];
  const to = tubes[toIdx];
  if (from.length === 0) return false;
  if (to.length >= BALLS_PER_TUBE) return false;
  if (to.length === 0) return true;
  return to[to.length - 1] === from[from.length - 1];
}

function getTopGroup(tube) {
  if (tube.length === 0) return [];
  const topColor = tube[tube.length - 1];
  const group = [];
  for (let i = tube.length - 1; i >= 0; i--) {
    if (tube[i] === topColor) group.unshift(tube[i]);
    else break;
  }
  return group;
}

function pour(fromIdx, toIdx) {
  const from = tubes[fromIdx];
  const to = tubes[toIdx];
  const group = getTopGroup(from);
  const space = BALLS_PER_TUBE - to.length;
  const count = Math.min(group.length, space);

  // Save state for undo
  moveHistory.push({
    from: fromIdx,
    to: toIdx,
    count: count,
    fromBefore: [...from],
    toBefore: [...to],
  });

  // Move balls
  for (let i = 0; i < count; i++) {
    to.push(from.pop());
  }

  moves++;
  movesDisplay.textContent = moves;

  return count;
}

function undoMove() {
  if (moveHistory.length === 0) {
    showToast('Nothing to undo');
    return;
  }
  const last = moveHistory.pop();
  tubes[last.from] = last.fromBefore;
  tubes[last.to] = last.toBefore;
  moves--;
  movesDisplay.textContent = moves;
  selectedTube = null;
  renderAll();
  showToast('↩ Undo!');
}

function addTube() {
  if (hints <= 0) {
    // Trigger ad watch - ads.js handles the reward
    AdManager.showRewardAd((success) => {
      if (success) {
        hints++;
        showToast('📺 +1 Hint! (' + hints + ' total)');
        const idx = tubes.length;
        tubes.push([]);
        renderAll();
        showToast('➕ Extra tube added!');
      }
    });
    return;
  }
  hints--;
  const idx = tubes.length;
  tubes.push([]);
  renderAll();
  showToast('➕ Extra tube added!');
}

function onTubeClick(idx) {
  if (winOverlay.classList.contains('show')) return;

  if (selectedTube === null) {
    // Select a tube
    if (tubes[idx].length === 0) return;
    if (tubeComplete(tubes[idx])) return;
    selectedTube = idx;
  } else if (selectedTube === idx) {
    // Deselect
    selectedTube = null;
  } else {
    // Try to pour
    if (canPour(selectedTube, idx)) {
      pour(selectedTube, idx);
      selectedTube = null;
      renderAll();
      if (!checkWin()) {
        // Check if stuck (no valid moves)
        checkStuck();
      }
    } else {
      // Can't pour here, reselect
      selectedTube = (tubes[idx].length > 0 && !tubeComplete(tubes[idx])) ? idx : null;
    }
  }
  renderAll();
}

function checkStuck() {
  for (let i = 0; i < tubes.length; i++) {
    for (let j = 0; j < tubes.length; j++) {
      if (i !== j && canPour(i, j)) return; // Not stuck
    }
  }
  // Stuck!
  showToast('😅 Stuck? Use Undo or Extra Tube!');
}

function renderAll() {
  tubesArea.innerHTML = '';

  const totalTubes = tubes.length;
  const colsPerRow = totalTubes <= 6 ? 3 : 4;

  for (let i = 0; i < totalTubes; i++) {
    const tube = tubes[i];
    const tubeEl = document.createElement('div');
    tubeEl.className = 'tube';
    if (i === selectedTube) tubeEl.classList.add('selected');

    const bodyEl = document.createElement('div');
    bodyEl.className = 'tube-body';

    // Add rim
    const rimEl = document.createElement('div');
    rimEl.className = 'tube-rim';
    bodyEl.appendChild(rimEl);

    // Add balls (bottom to top in visual, so reverse order)
    for (let b = tube.length - 1; b >= 0; b--) {
      const ball = document.createElement('div');
      ball.className = 'ball ' + COLOR_CLASSES[tube[b]];
      bodyEl.appendChild(ball);
    }

    tubeEl.appendChild(bodyEl);
    tubeEl.addEventListener('click', () => onTubeClick(i));
    tubesArea.appendChild(tubeEl);
  }
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function newGame() {
  initGame();
  showToast('🔄 New Game!');
}

function nextLevel() {
  initGame();
  showToast('▶ Next Level!');
}

// ============ START ============
initGame();

// Donate
let donateTab = 'wx';
function toggleDonate() {
  document.getElementById('donateOverlay').classList.toggle('show');
}
function switchDonateTab(tab) {
  donateTab = tab;
  document.getElementById('tabWx').classList.toggle('active', tab === 'wx');
  document.getElementById('tabAli').classList.toggle('active', tab === 'ali');
  document.getElementById('donateImg').src = tab === 'wx' ? 'qr-wx.jpg' : 'qr-alipay.jpg';
}
</script>
