<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数字方块 - 合成大亨</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app {
  width: 100%;
  max-width: 420px;
  padding: 10px;
}

/* Header */
#header {
  text-align: center;
  margin-bottom: 8px;
}
#title {
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(135deg, #f6d365, #fda085);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 2px;
}
#score-board {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 8px 0;
}
.score-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding: 8px 18px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
}
.score-label {
  font-size: 11px;
  color: #aaa;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.score-value {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
}
.coin-icon { color: #f6d365; }

/* Grid */
#grid-wrap {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 10px;
}
#grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 4px;
  aspect-ratio: 1;
}
.cell {
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  transition: all 0.15s ease;
  position: relative;
  cursor: pointer;
  border: 2px solid transparent;
}
.cell.highlight {
  border-color: rgba(255,215,0,0.6);
  box-shadow: 0 0 12px rgba(255,215,0,0.3);
}
.cell.filled {
  cursor: default;
}
.cell.merging {
  animation: mergePop 0.3s ease;
}
@keyframes mergePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.25); }
  100% { transform: scale(1); }
}
@keyframes placeDrop {
  0% { transform: scale(0.3); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes shine {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
}

/* Tile colors based on value */
.tile-v1  { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
.tile-v2  { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
.tile-v4  { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; }
.tile-v8  { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a2e; }
.tile-v16 { background: linear-gradient(135deg, #fa709a, #fee140); color: #1a1a2e; }
.tile-v32 { background: linear-gradient(135deg, #f6d365, #fda085); color: #1a1a2e; }
.tile-v64 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: #1a1a2e; }
.tile-v128{ background: linear-gradient(135deg, #ffecd2, #fcb69f); color: #1a1a2e; animation: shine 2s infinite; }
.tile-v256{ background: linear-gradient(135deg, #ff9a9e, #fecfef); color: #1a1a2e; animation: shine 1.5s infinite; }
.tile-v512{ background: linear-gradient(135deg, #fddb92, #d1fdff); color: #1a1a2e; animation: shine 1s infinite; }
.tile-v1024{ background: linear-gradient(135deg, #a1c4fd, #c2e9fb); color: #1a1a2e; animation: shine 0.8s infinite; }
.tile-v2048{ background: linear-gradient(135deg, #ffd700, #ff8c00); color: #fff; animation: shine 0.5s infinite; font-size: 13px; }
.tile-huge{ background: linear-gradient(135deg, #ff0080, #ff8c00, #40e0d0); background-size: 200% 200%; color: #fff; animation: shine 0.4s infinite, rainbow 3s linear infinite; font-size: 11px; }
@keyframes rainbow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

/* Upcoming tiles */
#upcoming-section {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 10px;
}
#upcoming-label {
  font-size: 11px;
  color: #aaa;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
#upcoming-tiles {
  display: flex;
  justify-content: center;
  gap: 10px;
}
.upcoming-tile {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.15s ease;
  border: 3px solid transparent;
  color: #fff;
}
.upcoming-tile.selected {
  border-color: #f6d365;
  transform: scale(1.15);
  box-shadow: 0 0 20px rgba(246,211,101,0.5);
}
.upcoming-tile:hover {
  transform: scale(1.08);
}
.upcoming-tile.selected:hover {
  transform: scale(1.15);
}

/* Shop */
#shop {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.shop-btn {
  flex: 1;
  padding: 10px 6px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color: #ddd;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  text-align: center;
}
.shop-btn:hover {
  background: rgba(255,255,255,0.15);
}
.shop-btn:active {
  transform: scale(0.95);
}
.shop-btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.shop-icon { font-size: 20px; display: block; margin-bottom: 2px; }
.shop-cost { color: #f6d365; font-weight: 700; margin-top: 2px; }

/* Ad button */
#ad-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #f6d365, #fda085);
  color: #1a1a2e;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
#ad-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(246,211,101,0.4);
}
#ad-btn:active {
  transform: scale(0.97);
}

/* Game Over */
#game-over {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#game-over.show { display: flex; }
#game-over h2 {
  font-size: 32px;
  color: #f6d365;
  margin-bottom: 10px;
}
#game-over .final-score {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 20px;
}
#game-over .final-score span {
  color: #fff;
  font-size: 24px;
  font-weight: 800;
}
#restart-btn {
  padding: 14px 40px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #f6d365, #fda085);
  color: #1a1a2e;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
}

/* Toast */
#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #f6d365;
  padding: 10px 24px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* Coin float animation */
.coin-float {
  position: fixed;
  pointer-events: none;
  z-index: 150;
  font-weight: 800;
  font-size: 18px;
  color: #f6d365;
  animation: coinUp 1s ease-out forwards;
}
@keyframes coinUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
}

@media (max-width: 380px) {
  .cell { font-size: 13px; }
  .tile-v2048, .tile-huge { font-size: 10px; }
  .upcoming-tile { width: 46px; height: 46px; font-size: 16px; }
  .shop-btn { font-size: 11px; }
}

/* Donate */
.donate-trigger {
  width: 100%; padding: 10px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
  color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; margin-top: 6px;
}
.donate-trigger:hover { background: rgba(255,255,255,0.1); color: #f6d365; }
.donate-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.82); backdrop-filter: blur(8px);
  z-index: 300; align-items: center; justify-content: center;
}
.donate-overlay.show { display: flex; }
.donate-card {
  background: linear-gradient(135deg, #1e1e3a, #2a2a4a);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
  padding: 24px; text-align: center; max-width: 320px; width: 90%;
}
.donate-card h3 { font-size: 20px; color: #f6d365; margin-bottom: 4px; }
.donate-card .donate-sub { font-size: 12px; color: #888; margin-bottom: 16px; }
.donate-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.donate-tab {
  flex: 1; padding: 8px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04);
  color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.donate-tab.wx.active { background: rgba(7,193,96,0.2); border-color: #07c160; color: #07c160; }
.donate-tab.ali.active { background: rgba(22,119,255,0.2); border-color: #1677ff; color: #1677ff; }
.donate-qr-wrap {
  width: 200px; height: 200px; margin: 0 auto 12px; border-radius: 12px;
  overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
  background: #fff; display: flex; align-items: center; justify-content: center;
}
.donate-qr-wrap img { width: 100%; height: 100%; object-fit: contain; }
.donate-qr-placeholder { text-align: center; color: #999; font-size: 13px; padding: 20px; }
.donate-qr-placeholder .qr-icon { font-size: 48px; margin-bottom: 8px; }
.donate-close {
  margin-top: 8px; padding: 10px 36px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2); background: transparent;
  color: #aaa; font-size: 14px; cursor: pointer;
}
.donate-close:hover { background: rgba(255,255,255,0.1); }
#donate-hint { color: #f6d365; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="title">🧩 数字方块</div>
    <div id="score-board">
      <div class="score-box">
        <div class="score-label">得分</div>
        <div class="score-value" id="score-display">0</div>
      </div>
      <div class="score-box">
        <div class="score-label"><span class="coin-icon">🪙</span> 金币</div>
        <div class="score-value" id="coin-display">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">最高分</div>
        <div class="score-value" id="best-display">0</div>
      </div>
    </div>
  </div>

  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div id="upcoming-section">
    <div id="upcoming-label">👇 点击选择方块，再点击格子放置</div>
    <div id="upcoming-tiles"></div>
  </div>

  <div id="shop">
    <button class="shop-btn" id="shop-clear" onclick="buyClear()">
      <span class="shop-icon">💣</span>消除一格
      <div class="shop-cost">🪙 80</div>
    </button>
    <button class="shop-btn" id="shop-shuffle" onclick="buyShuffle()">
      <span class="shop-icon">🔀</span>刷新方块
      <div class="shop-cost">🪙 40</div>
    </button>
    <button class="shop-btn" id="shop-bonus" onclick="buyBonus()">
      <span class="shop-icon">⚡</span>双倍收益
      <div class="shop-cost">🪙 150</div>
    </button>
  </div>

  <button id="ad-btn" onclick="watchAd()">📺 看广告 · 获得 200 金币</button>

  <button class="donate-trigger" onclick="toggleDonate()">☕ 支持作者，请喝一杯咖啡</button>

  <div id="game-over">
    <h2>游戏结束</h2>
    <div class="final-score">最终得分 <span id="final-score">0</span></div>
    <button id="restart-btn" onclick="restartGame()">再来一局</button>
    <p style="margin-top:12px;"><a href="javascript:void(0)" onclick="gameOverEl.classList.remove('show');toggleDonate();" style="color:#f6d365;font-size:12px;text-decoration:none;">☕ 喜欢这个游戏？支持作者</a></p>
  </div>
</div>

<div class="donate-overlay" id="donateOverlay" onclick="if(event.target===this)toggleDonate()">
  <div class="donate-card">
    <h3>☕ 支持作者</h3>
    <p class="donate-sub">您的支持是我持续更新的动力 ❤️</p>
    <div class="donate-tabs">
      <div class="donate-tab wx active" id="tabWx" onclick="switchDonateTab('wx')">💚 微信赞赏</div>
      <div class="donate-tab ali" id="tabAli" onclick="switchDonateTab('ali')">💙 支付宝</div>
    </div>
    <div class="donate-qr-wrap">
      <img id="donateImg" src="qr-wx.jpg" alt="微信赞赏码">
    </div>
    <p id="donate-hint">保存图片 → 打开微信/支付宝 → 扫一扫</p>
    <button class="donate-close" onclick="toggleDonate()">先不用了，继续玩</button>
  </div>
</div>

<div id="toast"></div>

<script src="ads.js"></script>
<script>
// ============ Game Engine ============
const GRID_SIZE = 6;
const TILE_VALUES = [1, 2, 4, 8, 16];
const TILE_WEIGHTS = [30, 30, 20, 15, 5];

let grid = [];
let upcoming = [];
let selectedTile = null;
let score = 0;
let coins = 0;
let bestScore = 0;
let bonusMultiplier = 1;
let gameActive = true;

// DOM refs
const gridEl = document.getElementById('grid');
const upcomingEl = document.getElementById('upcoming-tiles');
const scoreDisplay = document.getElementById('score-display');
const coinDisplay = document.getElementById('coin-display');
const bestDisplay = document.getElementById('best-display');
const gameOverEl = document.getElementById('game-over');
const finalScoreEl = document.getElementById('final-score');
const toast = document.getElementById('toast');

// Load best score
bestScore = parseInt(localStorage.getItem('numberBlocks_best') || '0');
bestDisplay.textContent = bestScore;

function initGrid() {
  grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
  selectedTile = null;
  score = 0;
  coins = 0;
  bonusMultiplier = 1;
  gameActive = true;
  scoreDisplay.textContent = '0';
  coinDisplay.textContent = '0';
  gameOverEl.classList.remove('show');
  generateUpcoming();
  renderGrid();
}

function randomTileValue() {
  const rand = Math.random() * 100;
  let cumulative = 0;
  for (let i = 0; i < TILE_VALUES.length; i++) {
    cumulative += TILE_WEIGHTS[i];
    if (rand < cumulative) return TILE_VALUES[i];
  }
  return TILE_VALUES[0];
}

function generateUpcoming() {
  upcoming = [];
  for (let i = 0; i < 3; i++) {
    upcoming.push(randomTileValue());
  }
  renderUpcoming();
}

function getTileClass(value) {
  if (value >= 4096) return 'tile-huge';
  if (value >= 2048) return 'tile-v2048';
  if (value >= 1024) return 'tile-v1024';
  if (value >= 512) return 'tile-v512';
  if (value >= 256) return 'tile-v256';
  if (value >= 128) return 'tile-v128';
  if (value >= 64) return 'tile-v64';
  if (value >= 32) return 'tile-v32';
  if (value >= 16) return 'tile-v16';
  if (value >= 8) return 'tile-v8';
  if (value >= 4) return 'tile-v4';
  if (value >= 2) return 'tile-v2';
  return 'tile-v1';
}

function formatValue(value) {
  if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
  if (value >= 1000) return (value / 1000).toFixed(1) + 'K';
  return value;
}

function renderGrid() {
  gridEl.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (grid[r][c] > 0) {
        cell.classList.add('filled', getTileClass(grid[r][c]));
        cell.textContent = formatValue(grid[r][c]);
      }
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('click', () => onCellClick(r, c));
      gridEl.appendChild(cell);
    }
  }
}

function renderUpcoming() {
  upcomingEl.innerHTML = '';
  upcoming.forEach((val, idx) => {
    const tile = document.createElement('div');
    tile.className = 'upcoming-tile ' + getTileClass(val);
    tile.textContent = formatValue(val);
    if (selectedTile === idx) tile.classList.add('selected');
    tile.addEventListener('click', (e) => {
      e.stopPropagation();
      selectTile(idx);
    });
    upcomingEl.appendChild(tile);
  });
}

function selectTile(idx) {
  if (!gameActive) return;
  if (selectedTile === idx) {
    selectedTile = null;
  } else {
    selectedTile = idx;
  }
  renderUpcoming();
  renderGrid();
}

function onCellClick(r, c) {
  if (!gameActive) return;
  if (selectedTile === null) return;
  if (grid[r][c] !== 0) return;

  placeTile(r, c, selectedTile);
}

function placeTile(r, c, tileIdx) {
  const value = upcoming[tileIdx];
  grid[r][c] = value;

  // Animate placement
  const cells = gridEl.children;
  const cell = cells[r * GRID_SIZE + c];
  cell.style.animation = 'none';
  cell.offsetHeight;
  cell.style.animation = 'placeDrop 0.3s ease';

  // Remove used tile
  upcoming.splice(tileIdx, 1);
  selectedTile = null;

  // Check merges
  processMerges(r, c);

  // Refill upcoming
  while (upcoming.length < 3) {
    upcoming.push(randomTileValue());
  }

  renderGrid();
  renderUpcoming();
  updateShopButtons();

  // Check game over
  if (checkGameOver()) {
    gameActive = false;
    finalScoreEl.textContent = score;
    gameOverEl.classList.add('show');
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('numberBlocks_best', bestScore);
      bestDisplay.textContent = bestScore;
      showToast('🎉 新纪录！');
    }
  }
}

function processMerges(startR, startC) {
  let merged = false;
  let queue = [[startR, startC]];
  const visited = new Set();

  while (queue.length > 0) {
    const [r, c] = queue.shift();
    const key = `${r},${c}`;
    if (visited.has(key)) continue;
    if (grid[r][c] === 0) continue;
    visited.add(key);

    const directions = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [dr, dc] of directions) {
      const nr = r + dr;
      const nc = c + dc;
      if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
      if (grid[nr][nc] === 0) continue;

      if (grid[r][c] === grid[nr][nc]) {
        // Merge!
        const oldVal = grid[r][c];
        grid[r][c] = oldVal * 2;
        grid[nr][nc] = 0;
        score += oldVal * 2;
        coins += (oldVal * 2) * bonusMultiplier;
        merged = true;

        // Show coin float
        showCoinFloat(r, c, oldVal * 2);

        // Animate
        setTimeout(() => {
          const cells = gridEl.children;
          const cell = cells[r * GRID_SIZE + c];
          if (cell) {
            cell.classList.add('merging');
            setTimeout(() => cell.classList.remove('merging'), 300);
          }
        }, 50);

        // Continue chain from merged position
        if (!visited.has(key)) queue.push([r, c]);
        break;
      }
    }
  }

  scoreDisplay.textContent = score;
  coinDisplay.textContent = coins;

  if (merged) {
    renderGrid();
    // Check for more merges after a delay
    setTimeout(() => {
      for (let r = 0; r < GRID_SIZE; r++) {
        for (let c = 0; c < GRID_SIZE; c++) {
          if (grid[r][c] > 0) processMergesPass(r, c);
        }
      }
      renderGrid();
    }, 150);
  }
}

function processMergesPass(r, c) {
  if (grid[r][c] === 0) return;
  const directions = [[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dr, dc] of directions) {
    const nr = r + dr;
    const nc = c + dc;
    if (nr < 0 || nr >= GRID_SIZE || nc < 0 || nc >= GRID_SIZE) continue;
    if (grid[nr][nc] === 0) continue;
    if (grid[r][c] === grid[nr][nc]) {
      const oldVal = grid[r][c];
      grid[r][c] = oldVal * 2;
      grid[nr][nc] = 0;
      score += oldVal * 2;
      coins += (oldVal * 2) * bonusMultiplier;
      scoreDisplay.textContent = score;
      coinDisplay.textContent = coins;
      showCoinFloat(r, c, oldVal * 2);
      return;
    }
  }
}

function checkGameOver() {
  // Check if any empty cells
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (grid[r][c] === 0) return false;
    }
  }
  // Check if any possible merges
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const val = grid[r][c];
      const directions = [[1,0],[-1,0],[0,1],[0,-1]];
      for (const [dr, dc] of directions) {
        const nr = r + dr;
        const nc = c + dc;
        if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
          if (grid[nr][nc] === val) return false;
        }
      }
    }
  }
  return true;
}

// Shop
function updateShopButtons() {
  document.getElementById('shop-clear').classList.toggle('disabled', coins < 80 || !gameActive);
  document.getElementById('shop-shuffle').classList.toggle('disabled', coins < 40 || !gameActive);
  document.getElementById('shop-bonus').classList.toggle('disabled', coins < 150 || !gameActive || bonusMultiplier > 1);
}

function buyClear() {
  if (coins < 80 || !gameActive) return;
  coins -= 80;
  coinDisplay.textContent = coins;

  // Find a random filled cell
  const filled = [];
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (grid[r][c] > 0) filled.push([r, c]);

  if (filled.length > 0) {
    const [r, c] = filled[Math.floor(Math.random() * filled.length)];
    grid[r][c] = 0;
    renderGrid();
    showToast('💣 清除成功！');
  }
  updateShopButtons();
}

function buyShuffle() {
  if (coins < 40 || !gameActive) return;
  coins -= 40;
  coinDisplay.textContent = coins;
  upcoming = [];
  generateUpcoming();
  selectedTile = null;
  renderUpcoming();
  showToast('🔀 方块已刷新！');
  updateShopButtons();
}

function buyBonus() {
  if (coins < 150 || !gameActive || bonusMultiplier > 1) return;
  coins -= 150;
  coinDisplay.textContent = coins;
  bonusMultiplier = 2;
  showToast('⚡ 双倍收益激活！（持续到游戏结束）');
  updateShopButtons();
  document.getElementById('shop-bonus').classList.add('disabled');
}

// watchAd() 已移至 ads.js
// 如需更改广告行为，编辑 ads.js 即可

// Effects
function showCoinFloat(r, c, amount) {
  const gridRect = gridEl.getBoundingClientRect();
  const cellSize = gridRect.width / GRID_SIZE;
  const x = gridRect.left + c * cellSize + cellSize / 2;
  const y = gridRect.top + r * cellSize;

  const el = document.createElement('div');
  el.className = 'coin-float';
  el.textContent = `+${amount * bonusMultiplier}`;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function restartGame() {
  initGrid();
  renderGrid();
  renderUpcoming();
  updateShopButtons();
}

// Initialize
initGrid();
updateShopButtons();

// Donate
let donateTab = 'wx';
function toggleDonate() {
  document.getElementById('donateOverlay').classList.toggle('show');
}
function switchDonateTab(tab) {
  donateTab = tab;
  document.getElementById('tabWx').classList.toggle('active', tab === 'wx');
  document.getElementById('tabAli').classList.toggle('active', tab === 'ali');
  document.getElementById('donateImg').src = tab === 'wx' ? 'qr-wx.jpg' : 'qr-alipay.jpg';
}
